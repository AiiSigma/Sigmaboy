name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - List repo contents
      run: |
        echo "=== Root directory ==="
        ls -la
        echo ""
        echo "=== Find zip files ==="
        find . -name "*.zip" -type f

    - name: Unzip project
      run: |
        # Cari file zip di repo
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        echo "Found zip: $ZIP_FILE"
        
        # Unzip ke folder sementara
        mkdir -p _project
        unzip -o "$ZIP_FILE" -d _project
        
        # Cek struktur hasil unzip
        echo "=== Contents after unzip ==="
        ls -la _project/
        
        # Cari folder yang ada build.gradle-nya (root project Android)
        PROJECT_DIR=$(find _project -name "build.gradle" -not -path "*/app/*" -not -path "*/build/*" | head -1 | xargs dirname)
        echo "Project root detected: $PROJECT_DIR"
        
        # Pindahkan isi project root ke root repo
        # Hapus file zip dulu
        rm -f *.zip
        
        # Copy semua isi project ke root
        cp -rf "$PROJECT_DIR"/. .
        rm -rf _project
        
        echo "=== Final root contents ==="
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.0
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
